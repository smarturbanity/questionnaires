<!-- SmartUrbanity Base Template: Header + Footer -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartUrbanity - Template</title>
</head>
<body>
  <a href="#maincontent" class="skip-link">Skip to main content</a>

  <header role="banner">
    <div class="header-flex">
      <div class="brand">
        <img class="mp-logo" data-asset-src="smarturbanity_logo.png" alt="SmartUrbanity logo" />
        <div class="brand-title">
          <h1>SmartUrbanity</h1>
          <p>Advancing 15-minute cities through collaborative and smart urban solutions</p>
        </div>
      </div>

      <div class="right-header">
        <button id="toggleLang" class="lang-toggle" aria-label="Change language">EN</button>
      </div>
    </div>
  </header>

  <main id="maincontent" tabindex="-1" role="main"></main>

  <footer role="contentinfo">
    <p>SmartUrbanity consortium - privacy and data governance content for research transparency.</p>
    <p><a href="https://www.smarturbanity.com/partners" target="_blank" rel="noopener">Consortium partners</a> | <a href="https://dutpartnership.eu/projects/smarturbanity" target="_blank" rel="noopener">DUT project page</a></p>
  </footer>
</body>
</html>
